# ── Origen de imágenes ────────────────────────────────────────────
# Fallback global — aplica si un servicio no define su propio imageSource.
# local  — imagen en el containerd del nodo  (imagePullPolicy: Never)
# remote — imagen desde DockerHub            (imagePullPolicy: IfNotPresent)
imageSource: remote

