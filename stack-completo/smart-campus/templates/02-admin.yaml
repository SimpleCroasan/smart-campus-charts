---
# ─── Service ─────────────────────────────────────────────────────────────────
{{- if .Values.adminService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: admin
  namespace: smart-campus
  labels:
    app: admin
spec:
  selector:
    app: admin
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP

---
# ─── Deployment ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin
  namespace: smart-campus
  labels:
    app: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin
  template:
    metadata:
      labels:
        app: admin
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command: ['sh', '-c', 'until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done']
      containers:
        - name: admin
          image: {{ .Values.adminService.image }}:{{ .Values.adminService.tag }}
          {{- $source := .Values.adminService.imageSource | default .Values.imageSource }}
          imagePullPolicy: {{ if eq $source "remote" }}IfNotPresent{{ else }}Never{{ end }}
          ports:
            - containerPort: 8081
          env:
            - name: ADMIN_SERVICE_PORT
              value: "8081"
            - name: POSTGRESQL_HOST
              value: postgres
            - name: POSTGRESQL_PORT
              value: "5432"
            - name: POSTGRESQL_DB
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRESQL_DB
            - name: POSTGRESQL_USER
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRESQL_USER
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: POSTGRESQL_PASSWORD
          livenessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
{{- end }}
