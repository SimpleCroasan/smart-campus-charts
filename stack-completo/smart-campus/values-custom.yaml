# ── Perfil personalizado ──────────────────────────────────────────
# Cambia true/false según lo que necesites levantar

postgres:
  enabled: true

mongo:
  enabled: true

influxdb:
  enabled: true

minio:
  enabled: true

rabbitmq:
  enabled: true

emqx:
  enabled: true

dataService:
  enabled: true

adminService:
  enabled: true
# ── Imágenes ──────────────────────────────────────────────────────
# imageSource: local  — usa la imagen del containerd del nodo (imagePullPolicy: Never)
# imageSource: remote — descarga desde DockerHub              (imagePullPolicy: IfNotPresent)
dataService:
  imageSource: local
  image: data-service
  tag: latest

adminService:
  imageSource: local
  image: admin-service
  tag: latest
