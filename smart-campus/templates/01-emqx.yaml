---
# ─── Service Headless ────────────────────────────────────────────────────────
{{- if .Values.emqx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: emqx
  namespace: smart-campus
  labels:
    app: emqx
spec:
  clusterIP: None
  selector:
    app: emqx
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: ws
      port: 8083
      targetPort: 8083
    - name: wss
      port: 8084
      targetPort: 8084
    - name: mqtts
      port: 8883
      targetPort: 8883
    - name: dashboard
      port: 18083
      targetPort: 18083

---
# ─── StatefulSet ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: emqx
  namespace: smart-campus
  labels:
    app: emqx
spec:
  serviceName: emqx
  replicas: 1             # EMQX soporta clustering nativo mediante el mecanismo
                          # de discovery por DNS. Escalar requiere configurar
                          # EMQX_CLUSTER__DISCOVERY_STRATEGY=dns y apuntar al
                          # Service headless — no es solo subir este número.
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      # EMQX requiere correr como root para acceder a sus directorios internos,
      # igual que en el compose original (user: root).
      securityContext:
        runAsUser: 0
      containers:
        - name: emqx
          image: emqx/emqx:5.8
          ports:
            - name: mqtt
              containerPort: 1883
            - name: ws
              containerPort: 8083
            - name: wss
              containerPort: 8084
            - name: mqtts
              containerPort: 8883
            - name: dashboard
              containerPort: 18083
          volumeMounts:
            - name: emqx-data
              mountPath: /opt/emqx/data
            - name: emqx-log
              mountPath: /opt/emqx/log
          livenessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            tcpSocket:
              port: 1883
            initialDelaySeconds: 20
            periodSeconds: 5
            timeoutSeconds: 5

  # EMQX usa dos directorios separados: datos y logs.
  # Se crean dos PVCs independientes para poder gestionarlos por separado.
  volumeClaimTemplates:
    - metadata:
        name: emqx-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
    - metadata:
        name: emqx-log
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 500Mi
{{- end }}
